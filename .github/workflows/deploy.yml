name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [ main ] # Change this to master if your default branch uses it

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

env:
  ASTRO_MANAGED_PAGES: true

jobs:
  build:
    name: Build Asset Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm # Change to pnpm or yarn if using alternative package managers

      - name: Install Project Dependencies
        run: npm ci

      - name: Compile and Build Static Pages
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to Live Server Node
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
